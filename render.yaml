# Render (https://render.com) Blueprint.
# Single Docker service runs the server, which also serves the built web app
# (packages/web/dist) in production. Redis is provisioned automatically.
services:
  - type: web
    name: lucy-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/config
    plan: starter
    envVars:
      - key: PORT
        value: 8787
      - key: REDIS_URL
        fromService:
          name: lucy-redis
          type: redis
          property: connectionString
      - key: PUBLIC_SERVER_URL
        sync: false
      - key: FAL_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CREDIT_RATE_PER_SECOND
        value: 0.05
      - key: FREE_CREDITS
        value: 10

  - type: redis
    name: lucy-redis
    ipAllowList: []
